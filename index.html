<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Reading Pipeline</title>
  <link rel="icon" href="icons/favicon.svg">
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#2da44e">
  <link rel="apple-touch-icon" href="icons/icon-192.png">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-title" content="Reading">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif;
      background: #f6f8fa;
      color: #1f2328;
      min-height: 100dvh;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .wrap {
      width: 100%;
      max-width: 380px;
      padding: 2.5rem 1.5rem;
    }

    /* ── Header ─────────────────────────────────────── */
    .header { text-align: center; margin-bottom: 2.5rem; }

    .logo {
      font-size: 3.5rem;
      line-height: 1;
      margin-bottom: 1rem;
      display: block;
      filter: drop-shadow(0 2px 6px rgba(45,164,78,.25));
    }

    h1 {
      font-size: 1.5rem;
      font-weight: 700;
      letter-spacing: -.02em;
    }

    .version {
      margin-top: .4rem;
      font-size: .75rem;
      color: #656d76;
      min-height: 1.1em;
      letter-spacing: .01em;
    }

    /* ── Nav cards ───────────────────────────────────── */
    .cards { display: flex; flex-direction: column; gap: .75rem; }

    .card {
      display: flex;
      align-items: center;
      gap: 1rem;
      padding: 1.125rem 1rem;
      background: #fff;
      border: 1px solid #d0d7de;
      border-radius: 10px;
      text-decoration: none;
      color: inherit;
      box-shadow: 0 1px 3px rgba(31,35,40,.06), 0 1px 2px rgba(31,35,40,.04);
      transition: background 80ms ease, border-color 80ms ease,
                  box-shadow 120ms ease, transform 120ms ease;
    }

    .card:hover {
      background: #f6f8fa;
      border-color: #afb8c1;
      box-shadow: 0 3px 8px rgba(31,35,40,.1);
      transform: translateY(-1px);
    }

    .card:active { transform: none; box-shadow: 0 1px 2px rgba(31,35,40,.06); background: #eaeef2; }

    .card-emoji { font-size: 1.875rem; width: 2.5rem; text-align: center; flex-shrink: 0; }

    .card-body { flex: 1; }

    .card-title { font-weight: 600; font-size: .95rem; display: block; }

    .card-desc { font-size: .8rem; color: #656d76; margin-top: .15rem; display: block; }

    .chevron { color: #afb8c1; font-size: 1.5rem; font-weight: 200; flex-shrink: 0; line-height: 1; }

    /* ── Dark mode ───────────────────────────────────── */
    @media (prefers-color-scheme: dark) {
      body { background: #0d1117; color: #e6edf3; }
      .card { background: #161b22; border-color: #30363d; box-shadow: 0 1px 3px rgba(0,0,0,.3); }
      .card:hover { background: #1c2128; border-color: #6e7681; box-shadow: 0 3px 8px rgba(0,0,0,.4); }
      .card:active { background: #21262d; }
      .card-desc, .version, .chevron { color: #8b949e; }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <header class="header">
      <span class="logo">📚</span>
      <h1>Reading Pipeline</h1>
      <p class="version" id="version"></p>
    </header>

    <nav class="cards">
      <a href="save.html" class="card">
        <span class="card-emoji">📥</span>
        <div class="card-body">
          <span class="card-title">Sauvegarder</span>
          <span class="card-desc">Ajouter un article ou un EPUB</span>
        </div>
        <span class="chevron">›</span>
      </a>

      <a href="manage.html" class="card">
        <span class="card-emoji">📂</span>
        <div class="card-body">
          <span class="card-title">Bibliothèque</span>
          <span class="card-desc">Parcourir et supprimer</span>
        </div>
        <span class="chevron">›</span>
      </a>
    </nav>
  </div>

  <script>
    // Use stored token for higher rate limit (5000/h vs 60/h unauth)
    const hdrs = {};
    const t = localStorage.getItem('rp_gh_token');
    if (t) hdrs.Authorization = `Bearer ${t}`;

    fetch('https://api.github.com/repos/t2ym5u/reading-pipeline/commits/main', { headers: hdrs })
      .then(r => r.json())
      .then(({ sha, commit }) => {
        const d = new Date(commit.committer.date);
        const date = d.toLocaleDateString('fr-FR', { day: 'numeric', month: 'long', year: 'numeric' });
        document.getElementById('version').textContent = `Mis à jour le ${date} · ${sha.slice(0, 7)}`;
      })
      .catch(() => {});

    if ('serviceWorker' in navigator)
      navigator.serviceWorker.register('sw.js', { scope: '/reading-pipeline/' });
  </script>
</body>
</html>
