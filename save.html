<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Save Article</title>
  <style>
    * { box-sizing: border-box; }
    body {
      font-family: system-ui, sans-serif;
      max-width: 480px;
      margin: 2rem auto;
      padding: 1.5rem;
      background: #f6f8fa;
    }
    h2 { margin-top: 0; }
    label { display: block; font-size: 0.85rem; font-weight: 600; margin: 1rem 0 0.25rem; }
    input {
      width: 100%;
      padding: 0.5rem 0.75rem;
      border: 1px solid #d0d7de;
      border-radius: 6px;
      font-size: 0.95rem;
      background: white;
    }
    button {
      margin-top: 1.25rem;
      width: 100%;
      padding: 0.75rem;
      background: #2da44e;
      color: white;
      border: none;
      border-radius: 6px;
      font-size: 1rem;
      cursor: pointer;
    }
    button:disabled { opacity: 0.5; cursor: default; }
    #status {
      margin-top: 1rem;
      padding: 0.75rem 1rem;
      border-radius: 6px;
      display: none;
      font-size: 0.9rem;
    }
    .ok  { background: #d1fae5; color: #065f46; }
    .err { background: #fee2e2; color: #991b1b; }
    details { margin-top: 2rem; font-size: 0.82rem; color: #57606a; }
    details summary { cursor: pointer; font-weight: 600; }
    code { background: #eee; padding: 0.1em 0.3em; border-radius: 3px; }
  </style>
</head>
<body>
  <h2>📖 Save Article</h2>

  <label>Token GitHub</label>
  <input id="token" type="password" placeholder="ghp_…" autocomplete="off">

  <label>URL de l'article</label>
  <input id="url" type="url" placeholder="https://…">

  <button id="btn" onclick="save()">Sauvegarder</button>
  <div id="status"></div>

  <details>
    <summary>Créer un token GitHub</summary>
    <p>
      Va sur <strong>github.com → Settings → Developer settings → Personal access tokens → Fine-grained tokens</strong>.<br>
      Sélectionne ce repo, accorde <code>Issues: Read and write</code>.<br>
      Le token est stocké uniquement dans ce navigateur (localStorage).
    </p>
  </details>

  <script>
    const OWNER = 't2ym5u';
    const REPO  = 'reading-pipeline';

    // Pre-fill URL from ?url= param (bookmarklet / Shortcut)
    const urlParam = new URLSearchParams(location.search).get('url');
    if (urlParam) document.getElementById('url').value = urlParam;

    // Restore token
    const stored = localStorage.getItem('rp_gh_token');
    if (stored) document.getElementById('token').value = stored;

    document.addEventListener('keydown', e => { if (e.key === 'Enter') save(); });

    async function save() {
      const token = document.getElementById('token').value.trim();
      const url   = document.getElementById('url').value.trim();
      if (!token || !url) return;

      localStorage.setItem('rp_gh_token', token);

      const btn    = document.getElementById('btn');
      const status = document.getElementById('status');
      btn.disabled    = true;
      btn.textContent = 'Envoi…';
      status.style.display = 'none';

      try {
        const res  = await fetch(`https://api.github.com/repos/${OWNER}/${REPO}/issues`, {
          method:  'POST',
          headers: { Authorization: `Bearer ${token}`, 'Content-Type': 'application/json' },
          body:    JSON.stringify({ title: url }),
        });
        const data = await res.json();
        if (res.ok) {
          status.className   = 'ok';
          status.textContent = `✅ En cours de traitement — issue #${data.number}`;
          document.getElementById('url').value = '';
        } else {
          status.className   = 'err';
          status.textContent = `❌ ${data.message}`;
        }
      } catch (e) {
        status.className   = 'err';
        status.textContent = `❌ ${e.message}`;
      }

      status.style.display = 'block';
      btn.disabled    = false;
      btn.textContent = 'Sauvegarder';
    }
  </script>
</body>
</html>
