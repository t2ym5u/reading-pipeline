name: Update Catalog

on:
  push:
    branches: [main]
    paths:
      - "library/*.epub"

permissions:
  contents: write

jobs:
  catalog:
    runs-on: ubuntu-latest
    # Skip when the article workflow pushes EPUBs (it updates the catalog itself)
    if: github.actor != 'github-actions[bot]'

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Rename EPUBs to UUID
        if: env.EPUB_ENCRYPT_KEY != ''
        env:
          EPUB_ENCRYPT_KEY: ${{ secrets.EPUB_ENCRYPT_KEY }}
        run: |
          python3 - <<'EOF'
          import os, uuid, re
          UUID_RE = re.compile(
              r'^[0-9a-f]{8}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{12}$'
          )
          for f in os.listdir("library"):
              if not f.endswith(".epub"):
                  continue
              stem = f[:-5]
              if not UUID_RE.match(stem):
                  new_name = str(uuid.uuid4()) + ".epub"
                  os.rename(f"library/{f}", f"library/{new_name}")
                  print(f"Renamed: {f} → {new_name}")
          EOF

      - name: Encrypt unencrypted EPUBs
        if: env.EPUB_ENCRYPT_KEY != ''
        env:
          EPUB_ENCRYPT_KEY: ${{ secrets.EPUB_ENCRYPT_KEY }}
        run: |
          for epub in library/*.epub; do
            [ -f "$epub" ] || continue
            if file "$epub" | grep -q "Zip archive"; then
              openssl enc -aes-256-cbc -pbkdf2 -k "$EPUB_ENCRYPT_KEY" \
                -in "$epub" -out "$epub.tmp" && mv "$epub.tmp" "$epub"
              echo "Encrypted: $epub"
            fi
          done

      - name: Update catalog
        env:
          PAGES_URL: https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}
          EPUB_ENCRYPT_KEY: ${{ secrets.EPUB_ENCRYPT_KEY }}
        run: python scripts/update_catalog.py

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add library/
          [ -f catalog.xml ]     && git add catalog.xml
          [ -f catalog.xml.enc ] && git add catalog.xml.enc
          git diff --cached --quiet || git commit -m "catalog: update after EPUB upload"
          git push
