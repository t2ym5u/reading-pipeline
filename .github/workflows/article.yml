name: Fetch Article

on:
  issues:
    types: [opened]

permissions:
  contents: write
  issues: write
  pages: write
  id-token: write

jobs:
  fetch:
    runs-on: ubuntu-latest
    if: startsWith(github.event.issue.title, 'http')

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          pip install trafilatura
          sudo apt-get install -y pandoc

      - name: Fetch article
        id: fetch
        env:
          ARTICLE_URL: ${{ github.event.issue.title }}
        run: python scripts/fetch.py "$ARTICLE_URL"

      - name: Encrypt EPUB
        if: env.EPUB_ENCRYPT_KEY != ''
        env:
          EPUB_ENCRYPT_KEY: ${{ secrets.EPUB_ENCRYPT_KEY }}
        run: |
          epub="library/${{ steps.fetch.outputs.epub_filename }}"
          openssl enc -aes-256-cbc -pbkdf2 -k "$EPUB_ENCRYPT_KEY" \
            -in "$epub" -out "$epub.tmp" && mv "$epub.tmp" "$epub"

      - name: Update catalog
        env:
          PAGES_URL: https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}
          EPUB_ENCRYPT_KEY: ${{ secrets.EPUB_ENCRYPT_KEY }}
        run: python scripts/update_catalog.py

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add library/
          [ -f catalog.xml ]     && git add catalog.xml
          [ -f catalog.xml.enc ] && git add catalog.xml.enc
          git commit -m "add: ${{ steps.fetch.outputs.epub_title }}"
          git push

      - name: Comment and close issue
        if: success()
        uses: actions/github-script@v7
        with:
          script: |
            const filename = '${{ steps.fetch.outputs.epub_filename }}'
            const { owner, repo } = context.repo
            const pagesUrl = `https://${owner}.github.io/${repo}`
            await github.rest.issues.createComment({
              owner, repo,
              issue_number: context.issue.number,
              body: `✅ Article ajouté à la bibliothèque.\n\n📥 [Télécharger l'EPUB](${pagesUrl}/library/${filename})\n\n📚 Catalogue OPDS : \`${pagesUrl}/catalog.xml\``
            })
            await github.rest.issues.update({
              owner, repo,
              issue_number: context.issue.number,
              state: 'closed'
            })

      - name: Comment on failure
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: '❌ Impossible de récupérer l\'article. Vérifie que l\'URL est accessible (pas de paywall).'
            })
