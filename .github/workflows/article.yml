name: Fetch Article
run-name: fetch article

on:
  repository_dispatch:
    types: [fetch-article]

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  fetch:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          pip install trafilatura
          sudo apt-get install -y pandoc

      - name: Fetch article
        id: fetch
        env:
          ARTICLE_URL: ${{ github.event.client_payload.url }}
        run: python scripts/fetch.py "$ARTICLE_URL"

      - name: Encrypt EPUB
        if: env.EPUB_ENCRYPT_KEY != ''
        env:
          EPUB_ENCRYPT_KEY: ${{ secrets.EPUB_ENCRYPT_KEY }}
        run: |
          epub="library/${{ steps.fetch.outputs.epub_filename }}"
          openssl enc -aes-256-cbc -pbkdf2 -k "$EPUB_ENCRYPT_KEY" \
            -in "$epub" -out "$epub.tmp" && mv "$epub.tmp" "$epub"

      - name: Update catalog
        env:
          PAGES_URL: https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}
          EPUB_ENCRYPT_KEY: ${{ secrets.EPUB_ENCRYPT_KEY }}
        run: python scripts/update_catalog.py

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add library/
          [ -f catalog.xml ]     && git add catalog.xml
          [ -f catalog.xml.enc ] && git add catalog.xml.enc
          git commit -m "add: new article"
          git push

